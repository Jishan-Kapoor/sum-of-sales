<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum Sales</title>

    <!-- Bootstrap CSS from jsdelivr -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Add custom styles here */
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Sum of Sales</h1>
        
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Sales</th>
                </tr>
            </thead>
            <tbody id="sales-data">
                <!-- CSV data will be populated here -->
            </tbody>
        </table>

        <h2>Total Sales: <span id="total-sales"></span></h2>
    </div>

    <!-- Bootstrap JS from jsdelivr -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        fetch('data.csv')
        .then(response => response.text())
        .then(csvText => {
            const lines = csvText.trim().split('\n').filter(line => line.trim());
            let total = 0;
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim());
                if (cols.length > 1) {
                    const val = parseFloat(cols[1]);
                    if (!isNaN(val)) total += val;
                }
            }
            document.getElementById('total-sales').textContent = total;
        })
        .catch(error => {
            console.error('Error fetching CSV data:', error);
        });
    </script>
</body>
</html>
